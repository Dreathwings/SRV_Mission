<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <script>
        (function() {
            try {
                const storedTheme = window.localStorage.getItem('mission-theme');
                const theme = storedTheme === 'light' || storedTheme === 'dark'
                    ? storedTheme
                    : (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
                document.documentElement.setAttribute('data-theme', theme);
            } catch (error) {}
        })();
    </script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='ressources/bm_gradignan_geii_rvb.png') }}">
    <title>{{ page_title|default('Acces refuse') }}</title>
</head>
<body class="page-error">
    <div class="background-color"></div>

    {% set nav_context = page_nav_context|default('Acces refuse') %}
    {% set nav_active = 'error' %}
    {% set nav_show_back = false %}
    {% include '_app_header.html' %}

    <main class="error-shell">
        <section class="error-card">
            <div class="error-code">
                <span class="material-icons">lock</span>
                {{ error_code|default('Erreur 403') }}
            </div>
            <h1 class="error-title">{{ error_title|default('Acces refuse') }}</h1>
            {% if error_copy %}
            <p class="error-copy">{{ error_copy }}</p>
            {% endif %}
        </section>
    </main>
    <script src="{{ url_for('static', filename='js/theme.js') }}"></script>
</body>
</html>
