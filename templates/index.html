<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <script>
        (function() {
            try {
                const storedTheme = window.localStorage.getItem('mission-theme');
                const theme = storedTheme === 'light' || storedTheme === 'dark'
                    ? storedTheme
                    : (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
                document.documentElement.setAttribute('data-theme', theme);
            } catch (error) {}
        })();
    </script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='ressources/bm_gradignan_geii_rvb.png') }}">
    <title>Ordres de mission</title>
</head>
<body class="page-home">
    <div class="background-color"></div>

    {% set nav_context = 'Accueil' %}
    {% set nav_active = 'home' %}
    {% set nav_show_back = false %}
    {% include '_app_header.html' %}

    <main class="page-shell">
        <section class="home-panel">
            <div class="home-actions">
                <a class="home-action primary" href="{{ url_for('ordre') }}">
                    <div>
                        <h3 class="home-action-title">Nouvelle demande mission</h3>
                    </div>
                    <span class="material-icons">east</span>
                </a>

                <a class="home-action" href="{{ url_for('view') }}">
                    <div>
                        <h3 class="home-action-title">Consulter les missions</h3>
                    </div>
                    <span class="material-icons">visibility</span>
                </a>

                {% if is_admin %}
                <a class="home-action" href="{{ url_for('admin_page') }}">
                    <div>
                        <h3 class="home-action-title">Administration</h3>
                    </div>
                    <span class="material-icons">admin_panel_settings</span>
                </a>
                {% endif %}
            </div>
        </section>
    </main>
    <script src="{{ url_for('static', filename='js/theme.js') }}"></script>
</body>
</html>
